services:
  ani-rss:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: ani-rss:local
    container_name: ani-rss
    restart: unless-stopped
    ports:
      - "7789:7789"
    environment:
      - TZ=Asia/Shanghai
      - CONFIG=/config
      - PUID=0
      - PGID=0
    volumes:
      # 配置文件目录
      - /root/ani-rss/config:/config
      # 媒体/下载目录（与 qBittorrent 使用相同的宿主机路径）
      - /mnt/ani-rss/media:/Media
