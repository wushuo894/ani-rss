spring:
  application:
    name: ani-rss-application
  web:
    resources:
      static-locations: classpath:/META-INF/dist
      chain:
        compressed: true
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
  servlet:
    multipart:
      max-request-size: 50MB
      max-file-size: 50MB
      enabled: true
  jmx:
    enabled: false
server:
  port: 7789
  address: 0.0.0.0
  tomcat:
    threads:
      max: 8
      min-spare: 4

springdoc:
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:false}
  api-docs:
    enabled: ${SWAGGER_ENABLED:false}
  default-produces-media-type: application/json